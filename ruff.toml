line-length = 100
target-version = "py311"

# Legacy directories are excluded from linting.
# app_energia/ — DROP/REWRITE verdict per MIGRATION.md; not maintained here.
# Dados/       — Data files; notebooks in KEEP-AS-DOCS status.
exclude = ["app_energia", "Dados"]

[lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = []

[lint.isort]
known-first-party = ["energia"]

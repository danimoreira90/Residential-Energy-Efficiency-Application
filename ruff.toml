line-length = 100
target-version = "py311"

# Legacy directories are excluded from linting.
# app_energia/ — DROP/REWRITE verdict per MIGRATION.md; not maintained here.
# Dados/       — Data files; notebooks in KEEP-AS-DOCS status.
exclude = ["app_energia", "Dados"]

[lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["N818"]  # TokenBudgetExceeded name matches PLAN.md spec

[lint.isort]
known-first-party = ["energia"]

[lint.per-file-ignores]
# See docs/tech-debt.md TD-007 — load_dotenv() must precede module-level
# imports that read ANTHROPIC_API_KEY at import time (e.g. chat.graph.GRAPH).
"src/energia/evals/run.py" = ["E402", "I001"]
"src/energia/ui/streamlit_app.py" = ["E402", "I001"]